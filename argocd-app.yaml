apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: compliance-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SHANERY86/compliance-pipeline-demo
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
